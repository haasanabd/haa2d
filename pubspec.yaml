name: haa_3d_management
description: A 3D printing management application with local SQLite database.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  intl: ^0.20.2
  provider: ^6.1.1
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  shared_preferences: ^2.2.2
  image_picker: ^1.0.4
  file_picker: ^6.1.1
  fl_chart: ^0.65.0
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6
  pdf: ^3.10.7
  printing: ^5.11.1
  open_filex: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
  generate: true
